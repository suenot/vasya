name: Android Build (Deepgram only)

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: npm ci

    - name: Create .env
      run: |
        echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
        echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
        echo "DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}" >> .env

    - name: Remove sidecar from bundle (Android only uses Deepgram)
      run: |
        # Backup original config
        cp src-tauri/tauri.conf.json src-tauri/tauri.conf.json.bak
        # Remove externalBin section for Android build
        cat src-tauri/tauri.conf.json | jq 'del(.bundle.externalBin)' > src-tauri/tauri.conf.json.tmp
        mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

    - name: Initialize Tauri Android
      run: |
        npm install -g @tauri-apps/cli
        npm run tauri android init || echo "Already initialized"

    - name: Build APK
      run: npm run tauri android build --apk
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        NDK_HOME: ${{ env.NDK_HOME }}

    - name: Restore original config
      if: always()
      run: |
        if [ -f src-tauri/tauri.conf.json.bak ]; then
          mv src-tauri/tauri.conf.json.bak src-tauri/tauri.conf.json
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: vasyapp-android
        path: |
          src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          src-tauri/gen/android/app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
