name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install frontend dependencies
      run: npm ci

    - name: Create .env file
      run: |
        echo "TELEGRAM_API_ID=${{ secrets.TELEGRAM_API_ID }}" >> .env
        echo "TELEGRAM_API_HASH=${{ secrets.TELEGRAM_API_HASH }}" >> .env
        echo "DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }}" >> .env

    - name: Build stt-sidecar for Android (arm64-v8a)
      working-directory: src-tauri/stt-sidecar
      run: |
        cargo build --release --target aarch64-linux-android
        mkdir -p target/release
        cp target/aarch64-linux-android/release/stt-sidecar target/release/stt-sidecar-aarch64-linux-android

    - name: Build stt-sidecar for Android (armeabi-v7a)
      working-directory: src-tauri/stt-sidecar
      run: |
        cargo build --release --target armv7-linux-androideabi
        cp target/armv7-linux-androideabi/release/stt-sidecar target/release/stt-sidecar-armv7-linux-androideabi

    - name: Install Tauri CLI
      run: npm install -g @tauri-apps/cli

    - name: Initialize Tauri Android
      run: npm run tauri android init || true

    - name: Build Android APK
      run: npm run tauri android build --apk
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        NDK_HOME: ${{ env.NDK_HOME }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: vasyapp-android-apk
        path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        if-no-files-found: warn

    - name: Upload to Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
