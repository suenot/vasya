<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vasyapp.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
  <title>Vasyapp</title>
  <script>
    // Android keyboard: compute keyboard height via visualViewport and expose as CSS variable.
    // With overlays-content the layout viewport never shrinks, so we track the offset ourselves.
    function updateKeyboardInset() {
      if (!window.visualViewport) return;
      var kbHeight = window.innerHeight - window.visualViewport.height;
      document.documentElement.style.setProperty('--keyboard-height', Math.max(0, kbHeight) + 'px');
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardInset);
      window.visualViewport.addEventListener('scroll', updateKeyboardInset);
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
